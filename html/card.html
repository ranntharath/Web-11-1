<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        .card{
            width: 250px;
            border: 1px solid rgb(232, 232, 232);
            margin: 100px;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0px 0px 4px rgb(220, 220, 220)
        }
        .top{
            width: 100%;
            height: 170px;
            background-color: gray;
            border-radius: 10px;
            
        }
        .buttom{
            margin-top: 20px;
        }
        .name{
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .price{
            font-size: 14px;
            margin-bottom: 10px;
        }
        button{
            padding: 7px  15px;
            background-color: rgb(4, 184, 255);
            border: none;
            border-radius: 5px;
            color: white;
        }
        img{
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_kWqKC7OaiZg7ND9P8bfMpFXW8ZMS_h09OA&s" alt="">
        </div>
        <div class="buttom">
            <p class="name">Wireless Headphones</p>
            <p class="price">$59.99</p>
            <button>Add to Card</button>
        </div>

    </div>
    
</body>
</html>
