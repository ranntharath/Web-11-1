<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form >
        <h3>Gender</h3>
        <input id="male" type="radio" name="gender">
        <label for="male">Male</label> <br>

        <input id="female" type="radio" name="gender">
        <label for="female">Female</label> <br>

        <input id="other" type="radio" name="gender">
        <label for="other">Other</label> <br>
    </form>

    <form >
        <h3>select your hobbies</h3>
        <input id="reading" type="checkbox" name="bobbies" value="reading">
        <label for="reading">Reading</label> <br>

        <input id="music" type="checkbox" name="bobbies" value="music">
        <label for="music">Music</label> <br>

        <input id="sport" type="checkbox" name="bobbies" value="sport">
        <label for="sport">Sport</label> <br>

        <input id="travel" type="checkbox"  name="bobbies" value="travel">
        <label for="travel">Travel</label>
    </form>

    <form action="">

        <label for="country">Select your country</label>
        <select id="country">
            <option value="" disabled selected >Select your country</option>
            <option value="cambodia">Cambodia</option>
            <option value="usa" >USA</option>
            <option value="japan">Japan</option>
        </select>
    </form>

    <form action="">
        <select name="" id="">
            <option value="" selected disabled>select your course</option>

            <optgroup label="Web development">
                <option value="">HTML</option>
                <option value="">CSS</option>
                <option value="">JavaScript</option>
            </optgroup>

            <optgroup label="Web Design">
                <option value="">Figma</option>
                <option value="">stitch</option>
            </optgroup>

        </select>
    </form>
    <br>
    <form action="" method="">

        <fieldset style="width: 300px;">
            <legend>Personal infomation</legend>

            <label for="first_name">First Name</label> <br>
            <input type="text" id="first_name"> <br><br>

            <label for="last_name">Last Name</label> <br>
            <input type="text" id="last_name"> <br> <br>

            <label for="email">Email</label> <br>
            <input type="email" id="email"> <br> <br>
            <button>Submit</button>
        </fieldset>

    </form>

</body>
</html>
