<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        p{
            color: red;
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            text-align: center;
            text-decoration: underline;
            text-shadow: 2px 2px 10px rgb(255, 0, 0);
            text-transform: capitalize;
            letter-spacing: 30px;
            line-height: 20px;


        }
        h3{
            background-color: aqua;
            width: 200px;
            /* height: 100px; */
            /* padding: 10px; */
            padding-left: 20px;
            padding-top: 10px;
            padding-bottom: 50px;
            border: 2px solid red;
            /* border-radius: 10px; */
            /* border-top-left-radius: 20px; */
            border-radius: 10px 20px 30px 40px;
            /* margin: 100px; */
            margin-left: 100px;
            margin-top: 20px;
            box-shadow: 2px 2px 5px red;
        }
    </style>
</head>
<body>
    <p >Text styling</p>
    <p>text styling</p>

    <h3>box model</h3>

    
</body>
</html>
