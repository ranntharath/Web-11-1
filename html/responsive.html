<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            padding: 0 20px;
        }
        .header{
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .header-box{
            width: 100%;
            background-color: orange;
            height: 100px;
        }
        .section2{
            width: 100%;
            height: 200px;
            background-color: chartreuse;
            margin-top: 10px;
        }
        .sec3-box{
            background-color: rgb(58, 58, 255);
        }
        .section3{
            display: grid;
            gap: 10px;
            grid-template-rows: 100px 100px 100px;
            grid-template-columns: 1fr;
            margin-top:10px ;
        }
        .sec4-box{
            background-color: gray;
        }
        .sec4{
            display: grid;
            grid-template-rows: 100px 100px 100px 100px;
            gap: 10px;
            margin-top: 10px;
            grid-template-columns: 1fr;
        }

        @media (min-width:768px){
            .section2{
                height: 300px;
            }
            .sec4{
                grid-template-columns: 1fr 1fr;
            }
            body{
                padding: 0 50px;
            }
        }
        @media (min-width:1024px){
            .header{
                flex-direction: row;
            }
            .section2{
                height: 400px;
            }
            .section3{
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 200px;
            }
            .sec4{
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
            body{
                padding: 0 100px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-box"></div>
        <div class="header-box"></div>
    </div>

    <div class="section2">

    </div>

    <div class="section3">
        <div class="sec3-box"></div>
        <div class="sec3-box"></div>
        <div class="sec3-box"></div>
    </div>
    

    <div class="sec4">
        <div class="sec4-box"></div>
        <div class="sec4-box"></div>
        <div class="sec4-box"></div>
        <div class="sec4-box"></div>
    </div>
    
</body>
</html>
