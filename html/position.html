<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        .card{
            width: 250px;
            height: 300px;
            border: 1px solid rgb(236, 236, 236);
            box-shadow: 0 0 3px rgb(211, 211, 211);
            margin: 50px;
            border-radius: 10px;
            position: relative;
        }
        .top{
            width: 100%;
            height: 120px;
            background-color: rgb(119, 78, 255);
            border-radius: 10px 10px 0 0;
        }
        .body{
            text-align: center;
            padding-top: 35px;
            line-height: 25px;
        }
        .position{
            font-size: 16px;
            font-weight: bold;
        }
        .company{
            font-size: 14px;
            color: gray;
        }
        .icon{
            width: 25px;
        }
        button{
            padding: 5px 15px;
            background-color: rgb(119, 78, 255) ;
            border: none;
            border-radius: 25px;
            color: white;
        }
        .profile{
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            position: absolute;
            top: 70px;
            left: 80px ;
            border: 2px solid rgb(119, 78, 255) ;
        }
        .menu{
            width: 17px;
            position: absolute;
            top: 10px;
            right: 10px;
            
        }
    </style>
</head>
<body>

    <div class="card">
        <img class="menu" src="https://img.icons8.com/?size=100&id=84119&format=png&color=000000" alt="">
        <img class="profile" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEIQIwthwXuQJ_ACtEjBv-x0BZXSewJpXuXnu5JCppff2FbohPRTz_n10&s=10" alt="">
        <div class="top"></div>
        <div class="body">
            <p class="position">Frontend Developer</p>
            <p class="company">Tech Jon Seeker</p>
            <div>
                <img class="icon" src="https://img.icons8.com/?size=100&id=118497&format=png&color=000000" alt="">
                <img class="icon" src="https://img.icons8.com/?size=100&id=118497&format=png&color=000000" alt="">
                <img class="icon" src="https://img.icons8.com/?size=100&id=118497&format=png&color=000000" alt="">
            </div>
            <button>Message</button>
        </div>
    </div>
    
</body>
</html>
